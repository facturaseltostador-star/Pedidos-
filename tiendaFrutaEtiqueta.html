<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Producción El Tostador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="icon" href="logoTostador.png" type="image/x-icon" />
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="tienda.css" />
</head>

<body>
    <!-- 🔹 Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logoNegro.jpg" alt="Logo El Tostador" class="logo-navbar" />
                <span>Pedidos El Tostador</span>
            </a>
            <button class="btn btn-outline-light" id="btnCarrito">Ver Carrito</button>
        </div>
    </nav>

    <!-- 🔹 Secciones de productos -->
    <div class="container mt-4">
        <h2 class="mt-5 mb-3">Frutas congeladas</h2>
        <div class="row" id="frutasCongeladas"></div>

        <h2 class="mt-5 mb-3">Etiquetas</h2>
        <div class="row" id="etiquetas"></div>
    </div>

    <!-- 🔹 Modal del carrito -->
    <div class="modal fade" id="modalCarrito" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Carrito de Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCarrito"></tbody>
                    </table>

                    <h5>Datos del Pedido</h5>
                    <form id="formPedido" novalidate>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="local" class="form-label">Local</label>
                                <select name="local" class="form-select" id="local" required>
                                    <option value="" selected disabled>Seleccionar...</option>
                                    <option value="Café Caribeños (San José)">Café Caribeños (San José)</option>
                                    <option value="Café Limón (Boulevar Limón)">Café Limón (Boulevar Limón)</option>
                                    <option value="Tostao (Mepe Limón)">Tostao (Mepe Limón)</option>
                                    <option value="Café del Puerto (Puntarenas)">Café del Puerto (Puntarenas)</option>
                                    <option value="Café Guapiles(Guápiles)">Café Guapiles(Guápiles)</option>

                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="encargado" class="form-label">Encargado</label>
                                <input type="text" class="form-control" id="encargado" required />
                            </div>

                            <div class="p-3 border rounded mb-3">
                                <h6 class="fw-bold mb-2">Entrega de pedidos</h6>
                                <ul class="list-unstyled mb-0 small">
                                    <li><span class="fw-semibold">Locales del Caribe, Caribeños, San José y
                                            Puntarenas:</span> se coordinará con Jonathan.</li>
            
                                </ul>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Firma</label>
                                <canvas id="firma" class="border border-dark w-100" height="100"></canvas>
                                <button type="button" class="btn btn-sm btn-outline-danger mt-2"
                                    id="limpiarFirma">Limpiar Firma</button>
                            </div>
                        </div>

                        <div class="text-end">
                            <button id="btnProcesar" type="submit" class="btn btn-success">Procesar Pedido</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔹 Librerías externas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- 🔹 Firebase (centralizado) -->
    <script type="module" src="firebase.js"></script>

    <!-- 🔹 Script principal -->
    <script type="module" src="tiendaFrutaEtiqueta.js"></script>
</body>

</html>
