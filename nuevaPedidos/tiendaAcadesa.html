<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Producción El Tostador</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="icon" href="/Imagenes/logoTostador.png" type="image/x-icon" />
    <link rel="stylesheet" href="/Styles/tienda.css" />
</head>

<body>
    <!-- 🔹 Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="/Imagenes/logoNegro.jpg" alt="Logo El Tostador" class="logo-navbar" />
                <span>El Tostador</span>
            </a>
            <button class="btn btn-outline-light" id="btnCarrito">Ver Carrito</button>
        </div>
    </nav>

    <!-- 🔹 Secciones de productos colapsables -->
    <div class="container mt-4">

        <div class="accordion" id="categoriasProductos">

            <!-- Material de empaque -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#catEmpaque">
                        Material de empaque
                    </button>
                </h2>
                <div id="catEmpaque" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="row" id="materialEmpaque"></div>
                    </div>
                </div>
            </div>

            <!-- Limpieza -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#catLimpieza">
                        Limpieza
                    </button>
                </h2>
                <div id="catLimpieza" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="row" id="limpieza"></div>
                    </div>
                </div>
            </div>

            <!-- Nueces / Maní -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#catManiNueces">
                        Nueces / Maní
                    </button>
                </h2>
                <div id="catManiNueces" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="row" id="maniNueces"></div>
                    </div>
                </div>
            </div>

            <!-- Suministros de cafeteria -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#catCafeteria">
                        Suministros de cafeteria
                    </button>
                </h2>
                <div id="catCafeteria" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="row" id="suministrosCafeteria"></div>
                    </div>
                </div>
            </div>

            <!-- Barismo -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#catBarismo">
                        Barismo
                    </button>
                </h2>
                <div id="catBarismo" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="row" id="barismo"></div>
                    </div>
                </div>
            </div>

            <!-- Polvos-->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#catEspecies">
                        Polvos
                    </button>
                </h2>
                <div id="catEspecies" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="row" id="especiesDelMundo"></div>
                    </div>
                </div>
            </div>

            <!-- Garapiñado -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#catGarapinado">
                        Garapiñado
                    </button>
                </h2>
                <div id="catGarapinado" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="row" id="garapiñado"></div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- 🔹 Modal del carrito -->
    <div class="modal fade" id="modalCarrito" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Carrito de Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCarrito"></tbody>
                    </table>

                    <h5>Datos del Pedido</h5>
                    <form id="formPedido" novalidate>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="local" class="form-label">Local</label>
                                <select name="local" class="form-select" id="local" required>
                                    <option value="" selected disabled>Seleccionar...</option>
                                    <option value="ACADESA">ACADESA 1</option>
                                    <option value="ACADESA">ACADESA 2</option>
                                    <option value="ACADESA">P3</option>
                                    <option value="ACADESA">Cocina ACADESA</option>
                                    <option value="ACADESA">Limpieza</option>
                                    <option value="CET">CET</option>
                                    <option value="Grupo Breybo">Grupo Breybo</option>
                                    <option value="Café del Mercado">Café del Mercado</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="encargado" class="form-label">Encargado</label>
                                <input type="text" class="form-control" id="encargado" required />
                            </div>

                            <div class="p-3 border rounded mb-3">
                                <h6 class="fw-bold mb-2">Entrega de pedidos</h6>
                                <ul class="list-unstyled mb-0 small">
                                    <li><span class="fw-semibold">CET, Breybo, Café del Mercado:</span> martes
                                        o viernes próximo.</li>
                                </ul>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Firma</label>
                                <canvas id="firma" class="border border-dark w-100" height="100"></canvas>
                                <button type="button" class="btn btn-sm btn-outline-danger mt-2"
                                    id="limpiarFirma">Limpiar Firma</button>
                            </div>
                        </div>

                        <div class="text-end">
                            <button id="btnProcesar" type="submit" class="btn btn-success">Procesar Pedido</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔹 Librerías externas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- 🔹 Firebase (centralizado) -->
    <script type="module" src="firebase.js"></script>

    <!-- 🔹 Script principal -->
    <script type="module" src="/JS/tiendaAcadesa.js"></script>
</body>

</html>
