<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Mermas</title>

    <link rel="icon" href="logoTostador.png" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="merma.css">
</head>

<body>

    <div class="card-mermas">

        <h2 class="titulo">Registro de Mermas</h2>

        <form id="formMermas">

            <!-- Piso -->
            <div class="mb-3">
                <label class="form-label">Piso</label>
                <select id="piso" class="form-select" required>
                    <option value="">Seleccione...</option>
                    <option>Acadesa 1</option>
                    <option>Acadesa 2</option>
                    <option>P3</option>
                    <option>Cocina</option>
                    <option>Bodega</option>
                </select>
            </div>

            <!-- Nombre -->
            <div class="mb-4">
                <label class="form-label">Nombre</label>
                <input type="text" id="nombrePersona" class="form-control" placeholder="Nombre del encargado" required>
            </div>

            <hr>

            <h5>Artículos</h5>

            <div id="contenedorArticulos">

                <div class="row fila-articulo">
                    <div class="col-md-3">
                        <input type="text" class="form-control articulo" placeholder="Nombre del artículo" required>
                    </div>

                    <div class="col-md-2">
                        <input type="number" class="form-control cantidad" placeholder="Cantidad" required>
                    </div>

                    <div class="col-md-3">
                        <select class="form-select unidad" required>
                            <option value="">Unidad de medida</option>
                            <option>Unidad</option>
                            <option>Litros</option>
                            <option>Mililitros</option>
                            <option>Gramos</option>
                            <option>Kilos</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <input type="text" class="form-control justificacion" placeholder="Justificación" required>
                    </div>

                    <div class="col-md-1 d-flex gap-2">
                        <button type="button" class="btn btn-success" onclick="agregarFila()">+</button>
                        <button type="button" class="btn btn-danger" onclick="eliminarFila(this)">−</button>
                    </div>
                </div>

            </div>

            <div class="text-center mt-4">
                <button type="submit" id="btnEnviar" class="btn btn-dark px-5">
                    Enviar
                </button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="merma.js"></script>

</body>

</html>
